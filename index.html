<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VidCut Pro — Video Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-panel: #16161f;
    --bg-glass: rgba(255,255,255,0.04);
    --bg-glass2: rgba(255,255,255,0.07);
    --neon: #00d4ff;
    --neon2: #7b61ff;
    --neon3: #ff61b6;
    --accent: #00d4ff;
    --accent-glow: rgba(0,212,255,0.3);
    --text-primary: #f0f0ff;
    --text-secondary: #8888aa;
    --text-dim: #444466;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(0,212,255,0.4);
    --timeline-h: 200px;
    --toolbar-h: 56px;
    --bottom-h: 72px;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); font-family: 'DM Sans', sans-serif; color: var(--text-primary); }

  /* ═══════════════ LAYOUT ═══════════════ */
  #app { display: flex; flex-direction: column; height: 100dvh; width: 100%; }

  /* ═══════════════ TOOLBAR ═══════════════ */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
    position: relative; z-index: 100;
  }
  .toolbar-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--neon), var(--neon2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .toolbar-actions { display: flex; gap: 8px; align-items: center; }
  .toolbar-btn {
    height: 34px; padding: 0 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg-glass); color: var(--text-secondary); font-size: 12px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .toolbar-btn:hover { border-color: var(--border-active); color: var(--neon); background: rgba(0,212,255,0.08); }
  .toolbar-btn.primary { background: linear-gradient(135deg, var(--neon), var(--neon2)); border: none; color: #000; font-weight: 600; }
  .toolbar-btn.primary:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--accent-glow); }
  .undo-redo { display: flex; gap: 4px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--bg-glass); color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .icon-btn:hover { border-color: var(--border-active); color: var(--neon); }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ═══════════════ MAIN AREA ═══════════════ */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* ═══════════════ PREVIEW ═══════════════ */
  #preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--bg-primary); position: relative; overflow: hidden; min-height: 0;
  }
  #preview-area::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  #canvas-wrap {
    position: relative; border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 1px var(--border);
    max-width: calc(100% - 24px); max-height: calc(100% - 24px);
    background: #000; aspect-ratio: 16/9;
  }
  #canvas-wrap.vertical { aspect-ratio: 9/16; }
  #main-canvas { width: 100%; height: 100%; display: block; }
  #play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.2s;
  }
  #play-overlay:hover .play-ring { transform: scale(1.08); }
  .play-ring {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .play-ring svg { width: 24px; height: 24px; fill: #fff; margin-left: 3px; }

  /* Time display */
  #time-display {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 12px; font-size: 12px; font-family: 'Syne', monospace; color: var(--text-secondary);
    pointer-events: none;
  }
  #time-display span { color: var(--neon); }

  /* Empty state */
  #empty-state {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; cursor: pointer;
  }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--bg-glass); border: 2px dashed rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border { 0%,100% { border-color: rgba(0,212,255,0.3); } 50% { border-color: rgba(0,212,255,0.7); box-shadow: 0 0 20px rgba(0,212,255,0.2); } }
  .empty-icon svg { width: 36px; height: 36px; color: var(--neon); fill: none; stroke: currentColor; stroke-width: 1.5; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .empty-sub { font-size: 12px; color: var(--text-secondary); }

  /* ═══════════════ PLAYBACK BAR ═══════════════ */
  #playback-bar {
    height: 50px; background: var(--bg-secondary); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 16px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--bg-glass); color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .ctrl-btn:hover { color: var(--text-primary); background: var(--bg-glass2); }
  .ctrl-btn.play-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    color: #000;
  }
  .ctrl-btn.play-btn:hover { box-shadow: 0 0 20px var(--accent-glow); transform: scale(1.05); }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .play-btn svg { width: 18px; height: 18px; }

  /* ═══════════════ TIMELINE ═══════════════ */
  #timeline-section {
    height: var(--timeline-h); background: var(--bg-secondary);
    border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  #timeline-header {
    height: 28px; display: flex; align-items: center; padding: 0 12px;
    border-bottom: 1px solid var(--border); gap: 8px; flex-shrink: 0;
  }
  .tl-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }
  .tl-zoom { display: flex; gap: 4px; margin-left: auto; }
  .tl-zoom-btn {
    width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg-glass); color: var(--text-secondary); font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #timeline-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; }
  #timeline-scroll::-webkit-scrollbar { height: 3px; }
  #timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  #timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #timeline-inner { min-height: 100%; position: relative; display: flex; flex-direction: column; }

  /* Ruler */
  #tl-ruler { height: 20px; position: relative; background: var(--bg-panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .ruler-tick { position: absolute; bottom: 0; width: 1px; background: var(--text-dim); }
  .ruler-tick.major { height: 8px; background: var(--text-secondary); }
  .ruler-tick.minor { height: 4px; }
  .ruler-label { position: absolute; bottom: 9px; font-size: 9px; color: var(--text-dim); transform: translateX(-50%); }

  /* Tracks */
  #tracks-area { flex: 1; position: relative; display: flex; flex-direction: column; gap: 3px; padding: 4px 0; }
  .track-row { height: 40px; position: relative; display: flex; align-items: center; }
  .track-label {
    width: 56px; flex-shrink: 0; height: 100%; display: flex; align-items: center; justify-content: center;
    background: var(--bg-panel); border-right: 1px solid var(--border); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); font-weight: 600; gap: 4px;
    flex-direction: column;
  }
  .track-label svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.5; }
  .track-content { flex: 1; height: 100%; position: relative; overflow: hidden; }

  /* Clips */
  .clip {
    position: absolute; top: 3px; height: calc(100% - 6px); border-radius: 6px;
    cursor: pointer; overflow: hidden; user-select: none;
    border: 1.5px solid transparent; transition: border-color 0.15s;
    display: flex; align-items: center;
  }
  .clip.video-clip {
    background: linear-gradient(135deg, #1a2a3a, #0f1e2e);
    border-color: rgba(0,212,255,0.3);
  }
  .clip.audio-clip {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-color: rgba(123,97,255,0.3);
  }
  .clip.text-clip {
    background: linear-gradient(135deg, #2a1a2e, #1e0f28);
    border-color: rgba(255,97,182,0.3);
  }
  .clip.selected { border-color: var(--neon) !important; box-shadow: 0 0 10px rgba(0,212,255,0.3); }
  .clip-thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; position: absolute; }
  .clip-inner { position: relative; z-index: 1; padding: 0 8px; display: flex; align-items: center; gap: 6px; width: 100%; overflow: hidden; }
  .clip-name { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clip-dur { font-size: 9px; color: var(--text-secondary); margin-left: auto; flex-shrink: 0; }
  .clip-handle {
    position: absolute; top: 0; width: 8px; height: 100%; cursor: col-resize;
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .clip-handle.left { left: 0; border-radius: 6px 0 0 6px; background: rgba(0,212,255,0.2); }
  .clip-handle.right { right: 0; border-radius: 0 6px 6px 0; background: rgba(0,212,255,0.2); }
  .clip-handle::after { content: ''; width: 2px; height: 14px; background: rgba(0,212,255,0.6); border-radius: 1px; }

  /* Playhead */
  #playhead {
    position: absolute; top: 0; bottom: 0; width: 1.5px; background: var(--neon);
    pointer-events: none; z-index: 50;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  #playhead::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px; background: var(--neon); clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  }

  /* ═══════════════ BOTTOM TOOLBAR ═══════════════ */
  #bottom-bar {
    height: var(--bottom-h); background: var(--bg-secondary);
    border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; overflow-x: auto; padding: 0 8px; gap: 4px;
  }
  #bottom-bar::-webkit-scrollbar { display: none; }
  .tool-btn {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; min-width: 56px; height: 56px; border-radius: var(--radius-sm);
    background: transparent; border: none; cursor: pointer; color: var(--text-secondary);
    transition: all 0.2s; padding: 0 6px; position: relative;
  }
  .tool-btn:hover, .tool-btn.active { color: var(--neon); background: rgba(0,212,255,0.08); }
  .tool-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .tool-btn span { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
  .tool-divider { width: 1px; height: 36px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

  /* ═══════════════ EDIT PANEL (bottom sheet) ═══════════════ */
  #edit-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 65vh;
    display: flex; flex-direction: column;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
  }
  #edit-panel.open { transform: translateY(0); }
  .panel-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .panel-title {
    padding: 12px 16px 8px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .panel-title-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(0,212,255,0.15); display: flex; align-items: center; justify-content: center; }
  .panel-title-icon svg { width: 14px; height: 14px; fill: none; stroke: var(--neon); stroke-width: 2; }
  .close-panel { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-glass2); border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .close-panel svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
  .panel-body { flex: 1; overflow-y: auto; padding: 8px 16px 24px; }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── Panel: Trim ─── */
  .trim-wrap { display: flex; flex-direction: column; gap: 14px; }
  .trim-bar-outer { height: 48px; background: var(--bg-glass); border-radius: var(--radius-sm); border: 1px solid var(--border); position: relative; overflow: hidden; cursor: pointer; }
  .trim-fill { position: absolute; top: 0; bottom: 0; background: rgba(0,212,255,0.15); border: 2px solid var(--neon); border-radius: var(--radius-sm); }
  .trim-handle { position: absolute; top: 0; bottom: 0; width: 14px; background: var(--neon); border-radius: 4px; cursor: col-resize; display: flex; align-items: center; justify-content: center; }
  .trim-handle::after { content: ''; width: 2px; height: 20px; background: rgba(0,0,0,0.5); border-radius: 1px; }
  .trim-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
  .trim-info span { color: var(--neon); font-family: 'Syne', monospace; }

  /* ─── Panel: Speed ─── */
  .speed-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .speed-btn {
    flex: 1; min-width: 52px; height: 40px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg-glass);
    color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }
  .speed-btn.active, .speed-btn:hover { border-color: var(--neon); color: var(--neon); background: rgba(0,212,255,0.1); }

  /* ─── Panel: Filter ─── */
  .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .filter-item {
    aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--bg-glass); border: 1.5px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative;
  }
  .filter-item.active { border-color: var(--neon); }
  .filter-item:hover { border-color: var(--border-active); }
  .filter-preview { width: 100%; flex: 1; border-radius: 6px 6px 0 0; }
  .filter-name { font-size: 9px; font-weight: 600; text-transform: uppercase; padding-bottom: 6px; }

  /* ─── Panel: Text ─── */
  .text-input-wrap { position: relative; }
  .text-input-wrap input {
    width: 100%; height: 44px; background: var(--bg-glass); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; padding: 0 12px;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .text-input-wrap input:focus { border-color: var(--neon); }
  .color-row { display: flex; gap: 8px; margin-top: 10px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
  .color-dot.active { border-color: #fff; }
  .font-row { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; }
  .font-chip {
    flex-shrink: 0; height: 32px; padding: 0 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-glass); color: var(--text-secondary);
    font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .font-chip.active, .font-chip:hover { border-color: var(--neon); color: var(--neon); background: rgba(0,212,255,0.1); }
  .text-anim-row { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; }
  .anim-chip {
    flex-shrink: 0; height: 30px; padding: 0 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-glass); color: var(--text-secondary);
    font-size: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .anim-chip.active, .anim-chip:hover { border-color: var(--neon3); color: var(--neon3); background: rgba(255,97,182,0.1); }

  /* ─── Panel: Audio ─── */
  .audio-list { display: flex; flex-direction: column; gap: 8px; }
  .audio-item {
    height: 52px; background: var(--bg-glass); border: 1px solid var(--border);
    border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 12px; gap: 12px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .audio-item:hover { border-color: var(--neon2); }
  .audio-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(123,97,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .audio-icon svg { width: 16px; height: 16px; fill: none; stroke: var(--neon2); stroke-width: 1.5; }
  .audio-meta { flex: 1; min-width: 0; }
  .audio-name { font-size: 13px; font-weight: 500; }
  .audio-dur { font-size: 11px; color: var(--text-secondary); }

  /* ─── Panel: Transitions ─── */
  .transition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .trans-item {
    aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--bg-glass);
    border: 1.5px solid var(--border); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s;
  }
  .trans-item.active { border-color: var(--neon); background: rgba(0,212,255,0.1); }
  .trans-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.5; color: var(--text-secondary); }
  .trans-item.active svg, .trans-item:hover svg { color: var(--neon); }
  .trans-name { font-size: 9px; text-transform: uppercase; font-weight: 600; }

  /* ─── Panel: Adjust / Slider ─── */
  .slider-group { display: flex; flex-direction: column; gap: 12px; }
  .slider-row { display: flex; flex-direction: column; gap: 6px; }
  .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
  .slider-header span:last-child { color: var(--neon); font-family: 'Syne', monospace; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px rgba(0,212,255,0.5); cursor: pointer; }

  /* ═══════════════ EXPORT MODAL ═══════════════ */
  #export-modal {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.8);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #export-modal.open { opacity: 1; pointer-events: all; }
  .export-sheet {
    width: 100%; max-width: 480px; background: var(--bg-panel);
    border-radius: 20px 20px 0 0; padding: 16px 20px 32px;
    transform: translateY(20px); transition: transform 0.3s;
    border-top: 1px solid var(--border);
  }
  #export-modal.open .export-sheet { transform: translateY(0); }
  .export-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 20px; }
  .export-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .export-opt {
    height: 56px; border-radius: var(--radius); border: 1.5px solid var(--border);
    background: var(--bg-glass); display: flex; align-items: center; padding: 0 16px; gap: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .export-opt.active { border-color: var(--neon); background: rgba(0,212,255,0.08); }
  .export-opt:hover { border-color: var(--border-active); }
  .export-badge {
    width: 44px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; font-family: 'Syne', sans-serif;
  }
  .badge-720 { background: rgba(123,97,255,0.2); color: var(--neon2); border: 1px solid rgba(123,97,255,0.3); }
  .badge-1080 { background: rgba(0,212,255,0.2); color: var(--neon); border: 1px solid rgba(0,212,255,0.3); }
  .badge-4k { background: linear-gradient(135deg, rgba(255,97,182,0.2), rgba(123,97,255,0.2)); color: var(--neon3); border: 1px solid rgba(255,97,182,0.3); }
  .export-meta { flex: 1; }
  .export-res { font-size: 14px; font-weight: 600; }
  .export-size { font-size: 11px; color: var(--text-secondary); }
  .export-go-btn {
    width: 100%; height: 52px; border-radius: var(--radius); border: none;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    color: #000; font-size: 15px; font-weight: 800; font-family: 'Syne', sans-serif;

  }

  .close-modal { float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; }

  /* Progress bar */
  #export-progress { margin-top: 16px; display: none; }
  .prog-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-bar-inner { height: 100%; background: linear-gradient(90deg, var(--neon), var(--neon2)); border-radius: 3px; width: 0%; transition: width 0.3s; }
  .prog-label { font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center; }

  /* ═══════════════ TOAST ═══════════════ */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 18px; font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 400; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }

  /* ═══════════════ PROJECT PANEL ═══════════════ */
  #project-panel {
    position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,0.85);
    display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #project-panel.open { opacity: 1; pointer-events: all; }
  .project-sheet {
    width: 100%; background: var(--bg-panel); border-radius: 20px 20px 0 0;
    padding: 16px 16px 32px; max-height: 70vh; overflow-y: auto;
    border-top: 1px solid var(--border);
    transform: translateY(30px); transition: transform 0.3s;
  }
  #project-panel.open .project-sheet { transform: translateY(0); }
  .proj-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .proj-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .proj-card {
    background: var(--bg-glass); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: border-color 0.2s;
  }
  .proj-card:hover { border-color: var(--border-active); }
  .proj-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; }
  .proj-thumb svg { width: 28px; height: 28px; fill: none; stroke: var(--text-dim); stroke-width: 1; }
  .proj-info { padding: 8px 10px; }
  .proj-name { font-size: 12px; font-weight: 600; }
  .proj-date { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  .new-proj { background: rgba(0,212,255,0.05); border-color: rgba(0,212,255,0.2) !important; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); border: 1px dashed rgba(0,212,255,0.3); aspect-ratio: 1; cursor: pointer; flex-direction: column; gap: 8px; padding: 16px; transition: all 0.2s; }
  .new-proj:hover { background: rgba(0,212,255,0.1); }
  .new-proj svg { width: 28px; height: 28px; fill: none; stroke: var(--neon); stroke-width: 1.5; }
  .new-proj span { font-size: 11px; color: var(--neon); font-weight: 600; text-transform: uppercase; }

  /* ═══════════════ FORMAT TOGGLE ═══════════════ */
  .fmt-toggle { display: flex; gap: 4px; }
  .fmt-btn {
    width: 28px; height: 18px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg-glass); cursor: pointer; font-size: 8px; font-weight: 700;
    color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .fmt-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,212,255,0.1); }

  /* Glassmorphism decorative */
  .glass-panel {
    background: var(--bg-glass); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: var(--radius);
  }

  /* Waveform */
  .waveform-canvas { width: 100%; height: 100%; display: block; }

  /* Layer indicator */
  .track-num { width: 14px; height: 14px; border-radius: 3px; background: rgba(0,212,255,0.2); font-size: 8px; font-weight: 800; color: var(--neon); display: flex; align-items: center; justify-content: center; }

  /* Neon glow text */
  .glow { text-shadow: 0 0 20px rgba(0,212,255,0.5); }

  /* Add media button in timeline */
  .tl-add-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; border-radius: 50%; background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.3); color: var(--neon); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .tl-add-btn:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 12px rgba(0,212,255,0.3); }

  /* Format badge */
  .fmt-badge {
    font-size: 9px; font-weight: 800; font-family: 'Syne', sans-serif;
    padding: 2px 6px; border-radius: 4px; background: rgba(0,212,255,0.15); color: var(--neon);
    border: 1px solid rgba(0,212,255,0.2); letter-spacing: 0.5px;
  }

  /* Mobile safe */
  @media (max-width: 380px) {
    .tool-btn { min-width: 50px; }
    #canvas-wrap { max-height: 180px; }
  }
  @media (min-height: 800px) {
    :root { --timeline-h: 220px; }
  }
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════
   VidCut Pro — Core Engine
═══════════════════════════════════════ */

// ─── STATE ───
const state = {
  clips: [],              // all clips on timeline
  selectedClip: null,
  playing: false,
  currentTime: 0,
  duration: 0,
  zoom: 60,               // px per second
  format: '16:9',
  history: [],
  historyIdx: -1,
  exportRes: '720p',
  projects: JSON.parse(localStorage.getItem('vidcut-projects') || '[]'),
  filters: { brightness: 100, contrast: 100, saturation: 100, blur: 0 },
  speed: 1,
  activeTrack: 'v1',
};

let playInterval = null;
let activePanel = null;
let currentUploadTrack = 'v1';

// ─── CANVAS ───
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  renderFrame();
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

// ─── FORMAT ───
function setFormat(fmt) {
  state.format = fmt;
  const wrap = document.getElementById('canvas-wrap');
  wrap.className = fmt === '9:16' ? 'vertical' : '';
  ['16:9','9:16','1:1'].forEach(f => {
    const id = 'fmt-' + f.replace(':','-');
    document.getElementById(id).classList.toggle('active', f === fmt);
  });
  setTimeout(resizeCanvas, 50);
  toast('Format: ' + fmt);
}

// ─── UPLOAD ───
function triggerUpload(track) {
  if (track) currentUploadTrack = track;
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    await loadFile(file, currentUploadTrack);
  }
  e.target.value = '';
});

async function loadFile(file, track = 'v1') {
  const type = file.type.split('/')[0];
  const url = URL.createObjectURL(file);
  let clip = {
    id: Date.now() + Math.random(),
    name: file.name.replace(/\.[^.]+$/, '').substring(0, 20),
    type: type,
    src: url,
    file: file,
    track: track,
    startTime: 0,
    duration: 5,
    trimStart: 0,
    trimEnd: 5,
    speed: 1,
    volume: 1,
    filter: 'none',
    x: getTrackEndTime(track),
  };

  if (type === 'video') {
    clip.duration = await getVideoDuration(url);
    clip.trimEnd = clip.duration;
    clip.el = document.createElement('video');
    clip.el.src = url;
    clip.el.loop = false;
    clip.el.muted = false;
    clip.el.preload = 'auto';
    clip.colorType = 'video';
  } else if (type === 'image') {
    clip.duration = 3;
    clip.trimEnd = 3;
    const img = new Image();
    img.src = url;
    clip.el = img;
    clip.colorType = 'image';
  } else if (type === 'audio') {
    clip.duration = await getVideoDuration(url);
    clip.trimEnd = clip.duration;
    clip.el = document.createElement('audio');
    clip.el.src = url;
    clip.el.preload = 'auto';
    clip.colorType = 'audio';
    clip.track = track === 'v1' ? 'a1' : track;
  }

  pushHistory();
  state.clips.push(clip);
  updateDuration();
  renderTimeline();
  renderFrame();

  // hide empty state
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('play-overlay').style.display = 'flex';

  toast('✓ ' + clip.name + ' yuklandi');
}

function getVideoDuration(url) {
  return new Promise(res => {
    const v = document.createElement('video');
    v.src = url;
    v.onloadedmetadata = () => res(v.duration || 5);
    v.onerror = () => res(5);
  });
}

function getTrackEndTime(track) {
  const clips = state.clips.filter(c => c.track === track);
  if (!clips.length) return 0;
  return Math.max(...clips.map(c => c.x + (c.trimEnd - c.trimStart) / c.speed));
}

// ─── TIMELINE RENDER ───
function renderTimeline() {
  updateRuler();
  const tracks = { v1: 'v1', v2: 'v2', a1: 'a1', t1: 't1' };
  Object.keys(tracks).forEach(t => {
    const el = document.getElementById('track-content-' + t);
    if (!el) return;
    el.innerHTML = '';
    state.clips.filter(c => c.track === t).forEach(clip => renderClip(clip, el));
  });
  updatePlayhead();
}

function renderClip(clip, container) {
  const trimmedDur = (clip.trimEnd - clip.trimStart) / clip.speed;
  const w = Math.max(40, trimmedDur * state.zoom);
  const left = clip.x * state.zoom;

  const div = document.createElement('div');
  div.className = 'clip ' + (clip.type === 'video' ? 'video-clip' : clip.type === 'audio' ? 'audio-clip' : 'text-clip');
  if (state.selectedClip && state.selectedClip.id === clip.id) div.classList.add('selected');
  div.style.left = left + 'px';
  div.style.width = w + 'px';
  div.dataset.clipId = clip.id;

  div.innerHTML = `
    <div class="clip-handle left"></div>
    <div class="clip-inner">
      <span class="clip-name">${clip.name}</span>
      <span class="clip-dur">${fmtTime(trimmedDur)}</span>
    </div>
    <div class="clip-handle right"></div>
  `;

  div.addEventListener('click', e => {
    e.stopPropagation();
    selectClip(clip);
  });
  setupClipDrag(div, clip);
  setupTrimHandles(div, clip);
  container.appendChild(div);
}

function selectClip(clip) {
  state.selectedClip = clip;
  renderTimeline();
  openPanel(clip.type === 'audio' ? 'adjust-audio' : 'trim');
}

// ─── TIMELINE DRAG ───
function setupClipDrag(el, clip) {
  let startX, startClipX;
  const onMove = e => {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const dx = clientX - startX;
    clip.x = Math.max(0, startClipX + dx / state.zoom);
    renderTimeline();
    updateDuration();
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
    pushHistory();
  };
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('clip-handle')) return;
    startX = e.clientX; startClipX = clip.x;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  el.addEventListener('touchstart', e => {
    if (e.target.classList.contains('clip-handle')) return;
    startX = e.touches[0].clientX; startClipX = clip.x;
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onUp);
  }, {passive:false});
}

function setupTrimHandles(el, clip) {
  const handles = el.querySelectorAll('.clip-handle');
  handles.forEach((h, i) => {
    const isLeft = i === 0;
    let startX, origStart, origEnd, origX;
    const onMove = e => {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const dt = (cx - startX) / state.zoom * clip.speed;
      if (isLeft) {
        clip.trimStart = Math.max(0, Math.min(origStart + dt, clip.trimEnd - 0.2));
        clip.x = origX + (clip.trimStart - origStart) / clip.speed;
      } else {
        clip.trimEnd = Math.max(clip.trimStart + 0.2, Math.min(origEnd + dt, clip.duration));
      }
      renderTimeline();
      updateDuration();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchend', onUp);
      pushHistory();
    };
    h.addEventListener('mousedown', e => {
      e.stopPropagation();
      startX = e.clientX; origStart = clip.trimStart; origEnd = clip.trimEnd; origX = clip.x;
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    h.addEventListener('touchstart', e => {
      e.stopPropagation();
      startX = e.touches[0].clientX; origStart = clip.trimStart; origEnd = clip.trimEnd; origX = clip.x;
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onUp);
    }, {passive:false});
  });
}

// ─── RULER ───
function updateRuler() {
  const ruler = document.getElementById('tl-ruler');
  const totalW = Math.max(state.duration * state.zoom + 200, 400);
  ruler.style.width = (totalW + 56) + 'px';
  document.getElementById('timeline-inner').style.width = (totalW + 56) + 'px';
  ruler.innerHTML = '';
  const step = state.zoom >= 80 ? 0.5 : state.zoom >= 40 ? 1 : 2;
  for (let t = 0; t <= state.duration + step * 5; t += step / 4) {
    const major = t % step < 0.01;
    const tick = document.createElement('div');
    tick.className = 'ruler-tick ' + (major ? 'major' : 'minor');
    tick.style.left = (56 + t * state.zoom) + 'px';
    ruler.appendChild(tick);
    if (major) {
      const lbl = document.createElement('div');
      lbl.className = 'ruler-label';
      lbl.style.left = (56 + t * state.zoom) + 'px';
      lbl.textContent = fmtTime(t);
      ruler.appendChild(lbl);
    }
  }
}

// ─── PLAYHEAD ───
function updatePlayhead() {
  const ph = document.getElementById('playhead');
  ph.style.left = (56 + state.currentTime * state.zoom) + 'px';
  document.getElementById('cur-time').textContent = fmtTime(state.currentTime);
  document.getElementById('tot-time').textContent = fmtTime(state.duration);
  document.getElementById('tl-duration').textContent = fmtTime(state.duration);
}

// Playhead drag
const tlScroll = document.getElementById('timeline-scroll');
tlScroll.addEventListener('click', e => {
  const rect = tlScroll.getBoundingClientRect();
  const x = e.clientX - rect.left + tlScroll.scrollLeft - 56;
  if (x < 0) return;
  state.currentTime = Math.min(x / state.zoom, state.duration);
  updatePlayhead();
  renderFrame();
});

// ─── PLAYBACK ───
function togglePlay() {
  if (!state.clips.length) { toast('Avval video yuklang'); return; }
  state.playing = !state.playing;
  const icon = document.getElementById('play-pause-icon');
  const ppIcon = document.getElementById('play-icon');
  if (state.playing) {
    icon.innerHTML = '<line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>';
    if (ppIcon) ppIcon.innerHTML = '<line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>';
    startPlayback();
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    if (ppIcon) ppIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    stopPlayback();
  }
}

function startPlayback() {
  let last = performance.now();
  function step(now) {
    if (!state.playing) return;
    const dt = (now - last) / 1000 * state.speed;
    last = now;
    state.currentTime += dt;
    if (state.currentTime >= state.duration) {
      state.currentTime = 0;
      stopPlayback();
      state.playing = false;
      document.getElementById('play-pause-icon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
      return;
    }
    updatePlayhead();
    renderFrame();
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function stopPlayback() {
  state.playing = false;
}

function seekStart() { state.currentTime = 0; updatePlayhead(); renderFrame(); }
function seekEnd() { state.currentTime = state.duration; updatePlayhead(); renderFrame(); }
function frameBack() { state.currentTime = Math.max(0, state.currentTime - 1/30); updatePlayhead(); renderFrame(); }
function frameForward() { state.currentTime = Math.min(state.duration, state.currentTime + 1/30); updatePlayhead(); renderFrame(); }

// ─── RENDER FRAME ───
function renderFrame() {
  if (!canvas.width) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const activeClips = state.clips.filter(c => {
    const dur = (c.trimEnd - c.trimStart) / c.speed;
    return c.x <= state.currentTime && c.x + dur >= state.currentTime && (c.type === 'video' || c.type === 'image');
  }).sort((a, b) => {
    const order = { v1: 0, v2: 1, t1: 2 };
    return (order[a.track] || 0) - (order[b.track] || 0);
  });

  activeClips.forEach(clip => {
    try {
      applyFilter(clip);
      if (clip.el && (clip.el.tagName === 'VIDEO' || clip.el.tagName === 'IMG' || clip.el.complete)) {
        const ar = clip.el.videoWidth / clip.el.videoHeight || clip.el.naturalWidth / clip.el.naturalHeight || 16/9;
        let dw = canvas.width, dh = canvas.height;
        if (ar > canvas.width / canvas.height) { dh = canvas.width / ar; } else { dw = canvas.height * ar; }
        const dx = (canvas.width - dw) / 2, dy = (canvas.height - dh) / 2;
        ctx.drawImage(clip.el, dx, dy, dw, dh);
      }
      ctx.filter = 'none';
    } catch(e) {}
  });

  // Text overlays
  state.clips.filter(c => c.type === 'text').forEach(tc => {
    const dur = (tc.trimEnd - tc.trimStart) / tc.speed;
    if (tc.x <= state.currentTime && tc.x + dur >= state.currentTime) {
      ctx.save();
      ctx.font = `bold ${Math.round(canvas.height * 0.07)}px ${tc.font || 'Syne'}`;
      ctx.fillStyle = tc.color || '#ffffff';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
      ctx.fillText(tc.text || '', canvas.width / 2, canvas.height * 0.85);
      ctx.restore();
    }
  });

  if (!activeClips.length && !state.clips.filter(c=>c.type==='text').length) {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function applyFilter(clip) {
  const f = state.filters;
  const blur = f.blur > 0 ? ` blur(${f.blur}px)` : '';
  ctx.filter = `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%)${blur}`;
}

// ─── DURATION ───
function updateDuration() {
  let max = 0;
  state.clips.forEach(c => {
    const end = c.x + (c.trimEnd - c.trimStart) / c.speed;
    if (end > max) max = end;
  });
  state.duration = max || 0;
  document.getElementById('tot-time').textContent = fmtTime(state.duration);
  document.getElementById('tl-duration').textContent = fmtTime(state.duration);
}

// ─── SPLIT ───
function splitClip() {
  if (!state.selectedClip) { toast('Avval clip tanlang'); return; }
  const clip = state.selectedClip;
  const localTime = state.currentTime - clip.x;
  const trimmedDur = (clip.trimEnd - clip.trimStart) / clip.speed;
  if (localTime <= 0 || localTime >= trimmedDur) { toast('Playhead clip ichida bo\'lsin'); return; }

  pushHistory();
  const trimCut = clip.trimStart + localTime * clip.speed;

  const clip2 = { ...clip, id: Date.now() + Math.random(), trimStart: trimCut, x: clip.x + localTime };
  clip.trimEnd = trimCut;

  state.clips.push(clip2);
  renderTimeline();
  toast('Bo\'lindi ✓');
}

// ─── ZOOM ───
function zoomTimeline(dir) {
  state.zoom = Math.max(20, Math.min(200, state.zoom + dir * 15));
  renderTimeline();
}

// ─── HISTORY ───
function pushHistory() {
  const snap = JSON.stringify(state.clips.map(c => ({
    ...c, el: null, file: null
  })));
  state.history = state.history.slice(0, state.historyIdx + 1);
  state.history.push(snap);
  state.historyIdx = state.history.length - 1;
  document.getElementById('undo-btn').disabled = state.historyIdx <= 0;
  document.getElementById('redo-btn').disabled = true;
}

function undo() {
  if (state.historyIdx <= 0) return;
  state.historyIdx--;
  document.getElementById('redo-btn').disabled = false;
  document.getElementById('undo-btn').disabled = state.historyIdx <= 0;
  toast('Undo');
}

function redo() {
  if (state.historyIdx >= state.history.length - 1) return;
  state.historyIdx++;
  document.getElementById('undo-btn').disabled = state.historyIdx <= 0;
  document.getElementById('redo-btn').disabled = state.historyIdx >= state.history.length - 1;
  toast('Redo');
}

            <div class="audio-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>
            <div class="audio-meta"><div class="audio-name">${n}</div><div class="audio-dur">0:30 · Royalti free</div></div>
          </div>
        `).join('')}
      </div>`
  },
  transition: {
    title: 'Transition',
    icon: `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="9" height="10" rx="2"/><path d="M22 12L16 7v10l6-5z"/></svg>`,
    render: () => {
      const trans = [
        {name:'Yo\'q', icon:'<line x1="5" y1="12" x2="19" y2="12"/>'},
        {name:'Fade', icon:'<rect x="3" y="3" width="18" height="18" rx="2" opacity="0.5"/>'},
        {name:'Slide', icon:'<polyline points="9 18 15 12 9 6"/>'},
        {name:'Zoom', icon:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/>'},
        {name:'Wipe', icon:'<line x1="12" y1="3" x2="12" y2="21"/><polyline points="8 7 12 3 16 7"/>'},
        {name:'Blur', icon:'<circle cx="12" cy="12" r="10" stroke-dasharray="2 3"/>'},
        {name:'Spin', icon:'<path d="M12 2a10 10 0 0 1 0 20"/>'},
        {name:'Dissolve', icon:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'},
      ];
      return `<div class="transition-grid">${trans.map(t=>`
        <div class="trans-item" onclick="setTransition('${t.name}',this)">
          <svg viewBox="0 0 24 24">${t.icon}</svg>
          <div class="trans-name">${t.name}</div>
        </div>`).join('')}</div>`;
    }
  },
  sticker: {
    title: 'Sticker & GIF',
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>`,
    render: () => `
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
        ${['😀','🎉','🔥','✨','💯','🎬','🎵','🌟','💥','❤️','👑','🚀','🎯','💎','🌈'].map(e=>`
          <button style="height:48px;background:var(--bg-glass);border:1px solid var(--border);border-radius:10px;font-size:22px;cursor:pointer;transition:all 0.2s" onclick="addSticker('${e}')" onmouseenter="this.style.transform='scale(1.2)'" onmouseleave="this.style.transform=''">${e}</button>
        `).join('')}
      </div>
      <div style="margin-top:12px">
        <button class="toolbar-btn" style="width:100%;justify-content:center;height:44px" onclick="triggerUpload('t1')">
          GIF yoki Sticker yuklash
        </button>
      </div>`
  },
  blur: {
    title: 'Blur Effekt',
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>`,
    render: () => `
      <div class="slider-group">
        <div class="slider-row">
          <div class="slider-header"><span>Blur kuchi</span><span id="v-blur2">${state.filters.blur}px</span></div>
          <input type="range" min="0" max="30" value="${state.filters.blur}" oninput="updateFilter('blur',this.value);document.getElementById('v-blur2').textContent=this.value+'px'">
        </div>
      </div>
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="speed-btn" onclick="setBlurPreset(0)">Yo'q</button>
        <button class="speed-btn" onclick="setBlurPreset(3)">Yengil</button>
        <button class="speed-btn" onclick="setBlurPreset(8)">O'rtacha</button>
        <button class="speed-btn" onclick="setBlurPreset(20)">Kuchli</button>
      </div>`
  },
  chroma: {
    title: 'Green Screen',
    icon: `<svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`,
    render: () => `
      <div style="padding:16px;background:var(--bg-glass);border-radius:12px;border:1px solid var(--border);text-align:center;margin-bottom:16px">
        <div style="font-size:32px;margin-bottom:8px">🎬</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">Chroma Key</div>
        <div style="font-size:11px;color:var(--text-secondary)">Yashil fon avtomatik olib tashlanadi</div>
      </div>
      <div class="slider-row">
        <div class="slider-header"><span>Rang chegarasi</span><span>50%</span></div>
        <input type="range" min="0" max="100" value="50">
      </div>
      <div class="slider-row" style="margin-top:12px">
        <div class="slider-header"><span>Yumshatish</span><span>10%</span></div>
        <input type="range" min="0" max="100" value="10">
      </div>
      <button class="toolbar-btn primary" style="width:100%;justify-content:center;height:44px;margin-top:16px" onclick="toast('Chroma key qo\'llanildi ✓')">Qo'llash</button>`
  },
  'adjust-audio': {
    title: 'Audio',
    icon: `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>`,
    render: () => `
      <div class="slider-group">
        <div class="slider-row">
          <div class="slider-header"><span>Ovoz</span><span id="v-vol2">100%</span></div>
          <input type="range" min="0" max="200" value="100" oninput="document.getElementById('v-vol2').textContent=this.value+'%'">
        </div>
        <div class="slider-row">
          <div class="slider-header"><span>Bass</span><span>0 dB</span></div>
          <input type="range" min="-12" max="12" value="0">
        </div>
        <div class="slider-row">
          <div class="slider-header"><span>Treble</span><span>0 dB</span></div>
          <input type="range" min="-12" max="12" value="0">
        </div>
      </div>
      <button class="toolbar-btn" style="width:100%;justify-content:center;height:44px;margin-top:16px" onclick="toast('Audio muted')">Ovozni o'chirish</button>`
  }
};

function openPanel(name) {
  const p = panels[name];
  if (!p) return;
  activePanel = name;
  document.getElementById('panel-title-text').textContent = p.title;
  document.getElementById('panel-icon').innerHTML = p.icon;
  document.getElementById('panel-body').innerHTML = p.render();
  document.getElementById('edit-panel').classList.add('open');

  // Animate in
  if (typeof gsap !== 'undefined') {
    gsap.from('#panel-body > *', { y: 20, opacity: 0, duration: 0.3, stagger: 0.05, ease: 'power2.out' });
  }

  // Tool btn highlight
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const map = { trim:'trim', speed:'speed', filter:'filter', adjust:'adjust', text:'text', music:'music', transition:'transition', sticker:'sticker', blur:'blur', chroma:'chroma' };
}

function closePanel() {
  document.getElementById('edit-panel').classList.remove('open');
  activePanel = null;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
}

// Panel actions
function applyTrim() { toast('Trim qo\'llanildi ✓'); closePanel(); renderTimeline(); }
function setSpeed(s) { state.speed = s; if (state.selectedClip) state.selectedClip.speed = s; openPanel('speed'); toast('Tezlik: ' + s + 'x'); }
function applyFilterEffect(css, el) {
  document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  canvas.style.filter = css;
  toast('Filtr qo\'llanildi');
}
function updateFilter(key, val) {
  state.filters[key] = parseFloat(val);
  const ids = { brightness: 'v-bright', contrast: 'v-contrast', saturation: 'v-sat', blur: 'v-blur' };
  const unit = key === 'blur' ? 'px' : '%';
  const el = document.getElementById(ids[key]);
  if (el) el.textContent = val + unit;
  renderFrame();
}
function setBlurPreset(v) { state.filters.blur = v; openPanel('blur'); renderFrame(); }
function updateTextClip(val) { if (state.selectedClip && state.selectedClip.type === 'text') { state.selectedClip.text = val; renderFrame(); } }
function setTextColor(c, el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  if (state.selectedClip && state.selectedClip.type === 'text') { state.selectedClip.color = c; renderFrame(); }
}
function setTextFont(f, el) {
  document.querySelectorAll('.font-chip').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  if (state.selectedClip && state.selectedClip.type === 'text') { state.selectedClip.font = f; renderFrame(); }
}
function setTextAnim(a, el) { document.querySelectorAll('.anim-chip').forEach(d => d.classList.remove('active')); el.classList.add('active'); toast('Animatsiya: ' + a); }
function setTransition(t, el) { document.querySelectorAll('.trans-item').forEach(d => d.classList.remove('active')); el.classList.add('active'); toast('Transition: ' + t); }
function addSticker(emoji) { toast('Sticker qo\'shildi: ' + emoji); }

// ─── EXPORT ───
let exportRes = '720p';
function showExport() { document.getElementById('export-modal').classList.add('open'); }
function hideExport() { document.getElementById('export-modal').classList.remove('open'); document.getElementById('export-progress').style.display = 'none'; document.getElementById('export-btn').style.display = ''; }
function selectExportRes(el, res) {
  exportRes = res;
  document.querySelectorAll('.export-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}
function startExport() {
  if (!state.clips.length) { toast('Avval video yuklang'); hideExport(); return; }
  document.getElementById('export-btn').style.display = 'none';
  const prog = document.getElementById('export-progress');
  prog.style.display = 'block';
  const bar = document.getElementById('prog-bar');
  const lbl = document.getElementById('prog-label');
  const steps = [
    [0, 'Tayyorlanmoqda…'],
    [15, 'Codec sozlanmoqda…'],
    [30, 'Kadrlar render qilinmoqda…'],
    [55, 'Audio mikslanmoqda…'],
    [75, 'Effektlar qo\'llanilmoqda…'],
    [90, 'Yakunlanmoqda…'],
    [100, '✓ Export tayyor!'],
  ];
  let i = 0;
  const interval = setInterval(() => {
    if (i >= steps.length) { clearInterval(interval); setTimeout(() => { hideExport(); toast('✓ ' + exportRes + ' eksport tayyor!'); }, 800); return; }
    bar.style.width = steps[i][0] + '%';
    lbl.textContent = steps[i][1];
    i++;
  }, 600);
}

// ─── PROJECTS ───
function showProjects() {
  const grid = document.getElementById('proj-grid');
  grid.innerHTML = `
    <div class="new-proj" onclick="newProject()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Yangi</span>
    </div>
    ${state.projects.map(p=>`
      <div class="proj-card" onclick="loadProject('${p.id}')">
        <div class="proj-thumb"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="15" height="10" rx="2"/><path d="M17 9l5-2v10l-5-2"/></svg></div>
        <div class="proj-info">
          <div class="proj-name">${p.name}</div>
          <div class="proj-date">${p.date}</div>
        </div>
      </div>`).join('')}
  `;
  document.getElementById('project-panel').classList.add('open');
}
function hideProjects() { document.getElementById('project-panel').classList.remove('open'); }
function newProject() {
  const name = 'Loyiha ' + (state.projects.length + 1);
  const proj = { id: Date.now(), name, date: new Date().toLocaleDateString('uz-UZ'), clips: [] };
  state.projects.push(proj);
  localStorage.setItem('vidcut-projects', JSON.stringify(state.projects));
  hideProjects();
  state.clips = [];
  state.currentTime = 0;
  state.duration = 0;
  renderTimeline();
  renderFrame();
  document.getElementById('empty-state').style.display = '';
  document.getElementById('play-overlay').style.display = 'none';
  toast('Yangi loyiha: ' + name);
}
function loadProject(id) { hideProjects(); toast('Loyiha yuklandi'); }

// ─── TOAST ───
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── UTILS ───
function fmtTime(s) {
  s = Math.max(0, s || 0);
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  return m + ':' + String(ss).padStart(2, '0');
}

// ─── DRAG & DROP on body ───
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  files.forEach(f => loadFile(f, 'v1'));
});

// ─── CLOSE PANELS ON OUTSIDE CLICK ───
document.getElementById('preview-area').addEventListener('click', () => {
  if (activePanel) closePanel();
});

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowLeft') frameBack();
  if (e.key === 'ArrowRight') frameForward();
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.key === 'Escape') closePanel();
});

// ─── INITIAL RENDER ───
renderTimeline();
renderFrame();

// ─── GSAP INTRO ───
if (typeof gsap !== 'undefined') {
  gsap.from('#toolbar', { y: -40, opacity: 0, duration: 0.5, ease: 'power3.out' });
  gsap.from('#empty-state > *', { y: 30, opacity: 0, duration: 0.6, stagger: 0.1, ease: 'power3.out', delay: 0.2 });
  gsap.from('#bottom-bar .tool-btn', { y: 20, opacity: 0, duration: 0.4, stagger: 0.04, ease: 'power2.out', delay: 0.3 });
}

// Telegram WebApp init
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
  window.Telegram.WebApp.setHeaderColor('#0a0a0f');
  window.Telegram.WebApp.setBackgroundColor('#0a0a0f');
}
</script>
